spring.application.name=ShoppingMS

#Consumer  MS port
server.port=6061

#Regisgter with  eureka server
eureka.client.service-url.default-zone=http://localhost:8761/eureka

#Connect to Config client
spring.config.import=optional:configserver:

#Activate the  actuators
management.endpoints.web.exposure.include=*

# To disble  health actuator
#management.endpoint.health.access=none

# To  get more details about  config props
management.endpoint.configprops.show-values=always
# To  get more details about  env
management.endpoint.env.show-values=always

#Activate  heap dump
management.endpoint.heapdump.access=unrestricted


logging.level.com.nt=DEBUG
logging.level.com.nt.rest=DEBUG

# Link this  ms to  Admin Server as admin client
spring.boot.admin.client.url=http://localhost:9999


#To enable  info actuator
management.info.env.enabled=true
#To activate  shudown actuator
management.endpoint.shutdown.access=unrestricted

#  info about  Project
info.app.name=ShoppingMS
info.app.version=1.0
info.app.vendor=SunMS
info.app.lead=MR.RN

# changing the base path of actuator
management.endpoints.web.base-path=/mynonfiction


#Circuit breaker configuration

# Enable health indicator
management.health.circuitbreakers.enabled=true
management.endpoint.health.enabled=true
management.endpoint.health.show-details=always

# Register health indicator
resilience4j.circuitbreaker.instances.ShoppingMS.register-health-indicator=true
# Sliding window type
resilience4j.circuitbreaker.instances.ShoppingMS.sliding-window-type=COUNT_BASED
# Size of sliding window
resilience4j.circuitbreaker.instances.ShoppingMS.sliding-window-size=10
# Minimum number of calls before calculating failure rate
resilience4j.circuitbreaker.instances.ShoppingMS.minimum-number-of-calls=10
# Failure rate threshold percentage
resilience4j.circuitbreaker.instances.ShoppingMS.failure-rate-threshold=50
# Time circuit remains open
resilience4j.circuitbreaker.instances.ShoppingMS.wait-duration-in-open-state=60s
# Number of permitted calls in half-open state
resilience4j.circuitbreaker.instances.ShoppingMS.permitted-number-of-calls-in-half-open-state=2
# Automatically transition from open to half-open
resilience4j.circuitbreaker.instances.ShoppingMS.automatic-transition-from-open-to-half-open-enabled=true
# Slow call duration threshold
resilience4j.circuitbreaker.instances.ShoppingMS.slow-call-duration-threshold=2s
# Slow call rate threshold
resilience4j.circuitbreaker.instances.ShoppingMS.slow-call-rate-threshold=60










